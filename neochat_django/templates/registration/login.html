<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoChat | Login</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f7f5ee 0%, #f0f4f8 100%);
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #1f2937;
        }
        .card {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 15px 35px rgba(31, 41, 55, 0.12);
            padding: 28px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
        }
        p {
            margin: 0 0 22px;
            color: #4b5563;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 11px;
            margin-bottom: 14px;
            font-size: 0.95rem;
        }
        button {
            width: 100%;
            border: 0;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            background: #0e7490;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .error {
            margin-bottom: 10px;
            color: #b91c1c;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>NeoChat</h1>
        <p>Painel de atendimento omnichannel</p>

        {% if form.errors %}
        <div class="error">Usuario ou senha invalidos.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="id_username">Usuario</label>
            <input id="id_username" name="username" type="text" required />

            <label for="id_password">Senha</label>
            <input id="id_password" name="password" type="password" required />

            <button type="submit">Entrar</button>
        </form>

        <div style="text-align: center; margin-top: 20px; color: #4b5563; font-size: 0.9rem;">
            Não tem uma conta? <a href="{% url 'register_template' %}" style="color: #0e7490; text-decoration: none; font-weight: 600;">Criar conta</a>
        </div>
    </div>
</body>
</html>
